<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Explore historical ticket price trends and find data-backed buying windows.">
    <meta name="theme-color" content="#0a0f1f">
    <title>{% block title %}TicketSignal{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}?v=1">
    {% block head %}{% endblock %}
  </head>
  <body>
    <div class="site-glow site-glow--one"></div>
    <div class="site-glow site-glow--two"></div>
    <header class="site-header">
      <a class="brand" href="{{ url_for('home') }}" aria-label="TicketSignal home">
        <span class="brand-mark" aria-hidden="true"><span></span><span></span><span></span></span>
        <span>Ticket<span>Signal</span></span>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="{{ url_for('home') }}#explore">Explore</a>
        <a href="{{ url_for('home') }}#how-it-works">How it works</a>
        <a class="nav-github" href="https://github.com/DevingGrosko/TicketPricePredictor-Public" target="_blank" rel="noreferrer">View project <span aria-hidden="true">&#8599;</span></a>
      </nav>
    </header>

    <main>{% block content %}{% endblock %}</main>

    <footer class="site-footer">
      <div>
        <a class="brand brand--footer" href="{{ url_for('home') }}">
          <span class="brand-mark" aria-hidden="true"><span></span><span></span><span></span></span>
          <span>Ticket<span>Signal</span></span>
        </a>
        <p>Historical ticket intelligence for smarter timing.</p>
      </div>
      <p>Built with Flask, SQLAlchemy and real listing history.</p>
    </footer>
    {% block scripts %}{% endblock %}
  </body>
</html>
