name: Deploy to PythonAnywhere

on:
  push:
    branches:
      - main
    paths:
      - "Flask_App/**"
      - "collector.py"
      - "graph_builder.py"
      - "models.py"
      - "tests/**"
      - ".github/workflows/deploy-pythonanywhere.yml"
  workflow_dispatch:

concurrency:
  group: pythonanywhere-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Validate collector and application code
        run: |
          python -m py_compile collector.py models.py graph_builder.py Flask_App/flask_app.py
          python -m unittest discover -s tests -v

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Configure restricted deployment key
        env:
          PYTHONANYWHERE_SSH_KEY: ${{ secrets.PYTHONANYWHERE_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PYTHONANYWHERE_SSH_KEY" > ~/.ssh/pythonanywhere_deploy
          chmod 600 ~/.ssh/pythonanywhere_deploy
          ssh-keyscan -t rsa,ed25519 -H ssh.pythonanywhere.com > ~/.ssh/known_hosts
          ssh-keygen -lf ~/.ssh/known_hosts -E sha256 | grep -F 'SHA256:zy2jmqxNg/fs6tFZK55OjHTI3B2UofzOiUvTPtcX3/Y'

      - name: Deploy website and reload web app
        run: |
          ssh \
            -i ~/.ssh/pythonanywhere_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            bunnyjeff@ssh.pythonanywhere.com deploy
